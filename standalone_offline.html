<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中日贸易包税报价工具</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><rect width=%2216%22 height=%2216%22 fill=%22%234299e1%22/><text x=%228%22 y=%2212%22 font-size=%2210%22 fill=%22white%22 text-anchor=%22middle%22>BT</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",PingFang SC,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:24px 16px}
h1{text-align:center;color:#2d3748;padding:28px 0 8px;font-size:1.6rem}
.subtitle{text-align:center;color:#718096;font-size:0.85rem;margin-bottom:24px}

.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.card h2{font-size:1rem;color:#4a5568;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #e2e8f0;font-weight:600}

.info-bar{background:#ebf8ff;color:#2b6cb2;padding:10px 14px;border-radius:8px;font-size:0.82rem;margin-bottom:16px;line-height:1.6}

.form-group{margin-bottom:14px}
.form-row{display:flex;gap:12px;flex-wrap:wrap}
.form-row .form-group{flex:1;min-width:150px}
label{display:block;font-size:0.82rem;color:#718096;margin-bottom:5px;font-weight:500}
input,select{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.95rem;transition:border-color 0.2s,box-shadow 0.2s;outline:none;background:#fff}
input:focus,select:focus{border-color:#4299e1;box-shadow:0 0 0 3px rgba(66,153,225,0.12)}

.btn{display:inline-block;padding:11px 28px;background:#4299e1;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;transition:background 0.2s;font-weight:600;letter-spacing:0.5px}
.btn:hover{background:#3182ce}
.btn:active{background:#2b6cb0}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-sm{padding:6px 16px;font-size:0.88rem;border-radius:6px}
.btn-add{background:#38a169;color:#fff}
.btn-add:hover{background:#2f855a}
.btn-search{background:#4299e1;color:#fff}
.btn-search:hover{background:#3182ce}
.btn-gray{background:#718096;color:#fff}
.btn-gray:hover{background:#5a6a7a}

.result-card{display:none;margin-top:16px}
.result-card.show{display:block}
.alert-box{padding:14px 16px;border-radius:10px;margin-bottom:14px;font-size:0.9rem;line-height:1.6}
.alert-red{background:#fff5f5;border:1.5px solid #fc8181;color:#c53030}
.alert-green{background:#f0fff4;border:1.5px solid #68d391;color:#276749}

.result-price-card{background:linear-gradient(135deg,#4299e1,#2b6cb0);border-radius:12px;padding:28px;text-align:center;margin-top:14px}
.result-price-label{color:rgba(255,255,255,0.85);font-size:0.9rem}
.result-price-value{color:#fff;font-size:2.8rem;font-weight:bold;margin-top:6px;letter-spacing:1px}
.result-price-unit{font-size:1.1rem;font-weight:normal;opacity:0.8}


input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield}

.box-list{margin-top:12px}
.box-item{background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.box-item-index{background:#4299e1;color:#fff;font-size:0.75rem;font-weight:bold;padding:2px 8px;border-radius:10px;min-width:28px;text-align:center;flex-shrink:0}
.box-item-info{flex:1;font-size:0.88rem;color:#4a5568;min-width:180px}
.box-item-del{background:none;border:none;color:#fc8181;font-size:1rem;cursor:pointer;padding:2px 6px;flex-shrink:0}
.box-item-del:hover{color:#e53e3e}
.box-empty{text-align:center;color:#a0aec0;font-size:0.88rem;padding:16px;background:#f7fafc;border-radius:8px;border:1px dashed #e2e8f0}

.mode-group{display:flex;gap:10px;margin-bottom:16px}
.mode-btn{flex:1;padding:14px 12px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;text-align:center;transition:all 0.2s;font-size:0.88rem;color:#4a5568}
.mode-btn:hover{border-color:#4299e1;background:#ebf8ff}
.mode-btn.active{border-color:#4299e1;background:#ebf8ff;color:#2b6cb0;box-shadow:0 0 0 3px rgba(66,153,225,0.12)}
.mode-btn-title{font-weight:bold;font-size:0.95rem}
.cost-mode-check{display:flex;align-items:center;gap:8px;margin-top:12px;padding:10px 12px;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;cursor:pointer}
.cost-mode-check input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#f6ad55}
.cost-mode-check label{font-size:0.85rem;color:#744210;cursor:pointer;font-weight:500}
.cost-mode-check .cost-hint{font-size:0.75rem;color:#b7791f;margin-left:4px}

.hs-search-row{display:flex;gap:8px;align-items:flex-end}
.hs-search-row .form-group{margin-bottom:0;flex:1}
.hs-results{margin-top:10px;display:none}
.hs-results.show{display:block}
.hs-results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hs-results-header span{font-size:0.82rem;color:#718096}
.hs-option{background:#f7fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.hs-option:hover{border-color:#4299e1;background:#ebf8ff}
.hs-option.selected{border-color:#4299e1;background:#ebf8ff;box-shadow:0 0 0 2px rgba(66,153,225,0.2)}
.hs-option-code{font-weight:bold;color:#2b6cb2;font-family:monospace;font-size:0.9rem}
.hs-option-desc{color:#4a5568;font-size:0.85rem;margin-top:4px;line-height:1.5}
.hs-option-rate{display:inline-block;background:#bee3f8;color:#2b6cb2;padding:2px 8px;border-radius:4px;font-size:0.8rem;font-weight:600;margin-top:6px}
.hs-option.rate-zero .hs-option-rate{background:#c6f6d5;color:#276749}
.hs-selected-info{background:#ebf8ff;border:1px solid #bee3f8;border-radius:8px;padding:10px 14px;font-size:0.88rem;color:#2b6cb2;margin-top:10px;display:none}
.hs-selected-info.show{display:block}

.footer{text-align:center;padding:20px;color:#a0aec0;font-size:0.78rem}

</style></head>
<body>
<div class="container">
  <h1>中日贸易包税报价</h1>
  <p class="subtitle">选择发货方式，填写信息，自动计算报价</p>

  <div class="info-bar">
    拦截规则：箱子三边和超过260cm无法运输
  </div>

  <div class="card">
    <h2>发货方式</h2>
    <div class="mode-group">
      <div class="mode-btn active" onclick="selectMode(0)" id="mode-0">
        <div class="mode-btn-title">海运货物</div>
      </div>
      <div class="mode-btn" onclick="selectMode(1)" id="mode-1">
        <div class="mode-btn-title">空运普货</div>
      </div>
      <div class="mode-btn" onclick="selectMode(2)" id="mode-2">
        <div class="mode-btn-title">空运带电货物</div>
      </div>
    </div>
    <label class="cost-mode-check">
      <input type="checkbox" id="cost-mode-cb" />
      <span>超长超重除尾程成本报价</span>
      <span class="cost-hint">（勾选后按成本价计算，隐藏尾程费用）</span>
    </label>
  </div>

  <div class="card">
    <h2>发货信息</h2>

    <div class="form-group">
      <label>HS编码查询 *</label>
      <div class="hs-search-row">
        <div class="form-group">
          <input type="text" id="hs-code" placeholder="输入HS编码，如 6109" maxlength="10" />
        </div>
        <button class="btn btn-search btn-sm" onclick="searchHs()">查询</button>
      </div>
      <div class="hs-selected-info" id="hs-selected">
        已选择：<strong id="hs-selected-text"></strong>
        <button class="btn btn-gray btn-sm" style="margin-left:8px;padding:2px 10px;font-size:0.78rem" onclick="clearHsSelection()">清除</button>
      </div>
      <div class="hs-results" id="hs-results"></div>
    </div>

    <div class="form-group" style="margin-top:10px">
      <label>实际税率（%）<span class="field-hint">选填。填写后优先使用此税率计算，忽略HS编码税率</span></label>
      <input type="number" id="custom-tariff-rate" placeholder="如：5、10、15" min="0" max="100" step="0.1" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>货物总重 (kg) *</label>
        <input type="number" id="total-weight" placeholder="请输入总重量" min="0.01" step="0.1" />
      </div>
      <div class="form-group">
        <label>总货值</label>
        <input type="number" id="cargo-value" placeholder="请输入总货值" min="0" step="0.01" />
      </div>
      <div class="form-group" style="min-width:120px">
        <label>币种</label>
        <select id="currency">
          <option value="JPY">日元 (JPY)</option>
          <option value="USD">美元 (USD)</option>
          <option value="CNY">人民币 (CNY)</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>箱子尺寸</h2>
    <p style="font-size:0.82rem;color:#718096;margin-bottom:12px">添加箱子尺寸，用于检查是否超限（三边和超过260cm拦截）。</p>

    <div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:12px">
      <div class="form-row" style="margin-bottom:10px">
        <div class="form-group" style="min-width:80px">
          <label>长 (cm)</label>
          <input type="number" id="box-length" placeholder="长" min="1" />
        </div>
        <div class="form-group" style="min-width:80px">
          <label>宽 (cm)</label>
          <input type="number" id="box-width" placeholder="宽" min="1" />
        </div>
        <div class="form-group" style="min-width:80px">
          <label>高 (cm)</label>
          <input type="number" id="box-height" placeholder="高" min="1" />
        </div>
        <div class="form-group" style="min-width:80px">
          <label>箱数</label>
          <input type="number" id="box-qty" placeholder="数量" min="1" value="1" />
        </div>
      </div>
      <button class="btn btn-add btn-sm" onclick="addBox()">添加此规格</button>
    </div>

    <div id="box-list" class="box-list">
      <div class="box-empty">暂无箱子，点击上方按钮添加（可选）</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="calc()">计算报价</button>
    <button class="btn btn-gray" onclick="resetForm()">重置</button>
  </div>

  <div class="result-card" id="result-card">
    <div class="card" style="margin-top:16px">
      <div id="result-content"></div>
    </div>
  </div>
</div>

<div class="footer">中日贸易包税报价工具 - v2.4</div>

var selectedHs = null;

var boxes = [];

// HS data is embedded inline; no network load needed (offline standalone build)

function selectMode(idx) {
  currentMode = idx;
  for (var i = 0; i < 3; i++) {
    var el = document.getElementById('mode-' + i);
    if (i === idx) el.classList.add('active');
    else el.classList.remove('active');
  }
}

function searchHs() {
  var q = document.getElementById('hs-code').value.trim();
  var resultsEl = document.getElementById('hs-results');

  if (!q) {
    resultsEl.classList.remove('show');
    resultsEl.innerHTML = '';
    return;
  }

  if (Object.keys(hsData).length === 0) {
    resultsEl.classList.add('show');
    resultsEl.innerHTML = '<div class="alert-box alert-red">HS编码数据正在加载中，请稍后重试。</div>';
    return;
  }

  var matches = [];
  var keys = Object.keys(hsData);
  for (var i = 0; i < keys.length; i++) {
    var code = keys[i];
    if (code.indexOf(q) >= 0) {
      var items = hsData[code];
      for (var j = 0; j < items.length; j++) {
        matches.push({ code: code, desc: items[j].desc, rate: items[j].rate, rate_pct: items[j].rate_pct, rate_label: items[j].rate_label });
      }
    }
  }

  if (matches.length === 0) {
    resultsEl.classList.add('show');
    resultsEl.innerHTML = '<div style="text-align:center;color:#a0aec0;font-size:0.88rem;padding:16px">未找到HS编码 "' + q + '" 的匹配结果</div>';
    return;
  }

  var html = '<div class="hs-results-header"><span>找到 ' + matches.length + ' 条匹配结果，请选择对应项：</span></div>';

  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var isZero = m.rate_pct === 0 || m.rate === '(無税)';
    html += '<div class="hs-option' + (isZero ? ' rate-zero' : '') + '" onclick="pickHs(' + i + ')" id="hs-opt-' + i + '">';
    html += '<div class="hs-option-code">' + m.code + '</div>';
    html += '<div class="hs-option-desc">' + m.desc + '</div>';
    var rateDisplay = formatRateDisplay(m.rate_pct, m.rate);
    html += '<span class="hs-option-rate">税率：' + rateDisplay + '</span>';
    html += '</div>';
  }

  resultsEl.innerHTML = html;
  resultsEl.classList.add('show');

  window._hsMatches = matches;
}

function pickHs(idx) {
  var m = window._hsMatches[idx];
  selectedHs = m;

  var allOpts = document.querySelectorAll('.hs-option');
  for (var i = 0; i < allOpts.length; i++) {
    allOpts[i].classList.remove('selected');
  }
  document.getElementById('hs-opt-' + idx).classList.add('selected');

  var rateDisplay = formatRateDisplay(m.rate_pct, m.rate);
  document.getElementById('hs-selected-text').textContent = m.code + ' - ' + m.desc.substring(0, 60) + (m.desc.length > 60 ? '...' : '') + '（' + rateDisplay + '）';
  document.getElementById('hs-selected').classList.add('show');
}

function clearHsSelection() {
  selectedHs = null;
  document.getElementById('hs-selected').classList.remove('show');
  var allOpts = document.querySelectorAll('.hs-option');
  for (var i = 0; i < allOpts.length; i++) {
    allOpts[i].classList.remove('selected');
  }
}

function addBox() {
  var length = parseFloat(document.getElementById('box-length').value) || 0;
  var width = parseFloat(document.getElementById('box-width').value) || 0;
  var height = parseFloat(document.getElementById('box-height').value) || 0;
  var qty = parseInt(document.getElementById('box-qty').value) || 0;

  if (length <= 0 || width <= 0 || height <= 0) { alert('请填写完整的长、宽、高尺寸'); return; }
  if (qty <= 0) { alert('请填写箱数'); return; }

  boxes.push({ length: length, width: width, height: height, qty: qty });
  renderBoxList();
  clearBoxForm();
}

function removeBox(index) {
  boxes.splice(index, 1);
  renderBoxList();
}

function renderBoxList() {
  var el = document.getElementById('box-list');
  if (boxes.length === 0) {
    el.innerHTML = '<div class="box-empty">暂无箱子，点击上方按钮添加（可选）</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < boxes.length; i++) {
    var b = boxes[i];
    var sum = b.length + b.width + b.height;
    var sumColor = sum > 260 ? '#e53e3e' : '#38a169';
    html += '<div class="box-item">';
    html += '<div class="box-item-index">' + (i + 1) + '</div>';
    html += '<div class="box-item-info">';
    html += '<span>' + b.length + 'x' + b.width + 'x' + b.height + 'cm</span>';
    html += '<span>三边和 <strong style="color:' + sumColor + '">' + sum + 'cm</strong></span>';
    html += '<span><strong>' + b.qty + '</strong> 箱</span>';
    html += '</div>';
    html += '<button class="box-item-del" onclick="removeBox(' + i + ')" title="删除">X</button>';
    html += '</div>';
  }
  el.innerHTML = html;
}

function clearBoxForm() {
  document.getElementById('box-length').value = '';
  document.getElementById('box-width').value = '';
  document.getElementById('box-height').value = '';
  document.getElementById('box-qty').value = '1';
}

function formatRateDisplay(ratePct, rawRate) {
  if (ratePct === null || ratePct === undefined) return rawRate;
  var absRate = Math.abs(ratePct);
  if (absRate === 0) return '0% (无税)';
  return absRate.toFixed(1) + '%';
}

function formatMoney(val, currency) {
  if (currency === 'JPY') return Math.round(val).toLocaleString() + ' JPY';
  if (currency === 'USD') return '$' + val.toFixed(2) + ' USD';
  return '\u00a5' + val.toFixed(2) + ' CNY';
}

function val(id) { return document.getElementById(id).value.trim(); }

function calc() {
  var errors = [];
  var totalWeight = parseFloat(document.getElementById('total-weight').value) || 0;
  var cargoValue = parseFloat(document.getElementById('cargo-value').value) || 0;
  var currency = document.getElementById('currency').value;
  var mode = MODES[currentMode];

  // === 货值币种统一转换为日元（计算前必须先统一币种）===
  // 汇率：1 CNY = 23.8794 JPY；1 USD = 6.793 CNY = 6.793×23.8794 ≈ 162.22 JPY
  var CNY_TO_JPY = 23.8794;
  var USD_TO_CNY = 1 / 0.1472;
  if (currency === 'CNY') {
    cargoValue = cargoValue * CNY_TO_JPY; // CNY → JPY
  } else if (currency === 'USD') {
    cargoValue = cargoValue * USD_TO_CNY * CNY_TO_JPY; // USD → CNY → JPY
  }
  // currency === 'JPY' 时保持不变

  var customTariffRateVal = document.getElementById('custom-tariff-rate').value.trim();
  var customTariffRate = customTariffRateVal ? parseFloat(customTariffRateVal) : null;
  if (totalWeight <= 0) errors.push('请填写货物总重');
  if (!selectedHs && customTariffRate === null) errors.push('请选择HS编码或填写实际税率（%）');

  if (selectedHs && selectedHs.rate_pct === null) {
    errors.push('所选择的HS编码税率格式特殊（' + selectedHs.rate + '），无法自动计算百分比税率，请确认');
  }

  for (var i = 0; i < boxes.length; i++) {
    var b = boxes[i];
    var sum = b.length + b.width + b.height;
    if (sum > 260) errors.push('箱' + (i + 1) + ' 三边和 ' + sum + 'cm 超过260cm，无法运输');
  }

  var resultBox = document.getElementById('result-card');
  var content = document.getElementById('result-content');

  if (errors.length > 0) {
    resultBox.classList.add('show');
    var errHtml = '<div class="alert-box alert-red"><strong>无法计算，请修正以下问题：</strong><ul style="margin-top:8px;padding-left:18px">';
    for (var i = 0; i < errors.length; i++) {
      errHtml += '<li style="margin-bottom:4px">' + errors[i] + '</li>';
    }
    errHtml += '</ul></div>';
    content.innerHTML = errHtml;
    return;
  }

  var tariffRate = customTariffRate !== null ? Math.abs(customTariffRate) : Math.abs(selectedHs.rate_pct);

  // === 核心计算（参考 Excel 税金逻辑）===
  // 手续费 = 货值 x 3%
  var serviceFee = cargoValue * 0.03;

  // 关税 = 货值 x 实际税率
  var customsDuty = cargoValue * (tariffRate / 100);

  // 消费税 = (货值 + 关税) x 7.8%（日本消费税率）
  var consumptionTax = (cargoValue + customsDuty) * 0.078;

  // 地方消费税 = 消费税 x 22/78
  var localTax = consumptionTax * (22 / 78);

  // 税金合计 = 关税 + 消费税 + 地方消费税
  var tax = customsDuty + consumptionTax + localTax;

  // 税金取整
  var taxRounded = Math.round(tax);

  // 转换为人民币（货值已统一为JPY，统一JPY→CNY换算）
  // 1 CNY = 23.8794 JPY → JPY / 23.8794 = CNY
  var serviceFeeCNY = serviceFee / CNY_TO_JPY;
  var customsDutyCNY = customsDuty / CNY_TO_JPY;
  var consumptionTaxCNY = consumptionTax / CNY_TO_JPY;
  var localTaxCNY = localTax / CNY_TO_JPY;

  var taxCNY = customsDutyCNY + consumptionTaxCNY + localTaxCNY;

  var feeSumCNY = serviceFeeCNY + taxCNY;
  var isCostMode = document.getElementById('cost-mode-cb').checked;
  var costRates = [6, 10, 13.5];
  var shippingRate = isCostMode ? costRates[currentMode] : mode.rate;
  var costPerKg = feeSumCNY / totalWeight + shippingRate;

  resultBox.classList.add('show');
  var html = '';

  html += '<div class="result-price-card">';
  var labelText = isCostMode ? '每 KG 除尾程成本（关税+消费税+手续费）' : '每 KG 成本';
  html += '<div class="result-price-label">' + labelText + '</div>';
  html += '<div class="result-price-value">\u00a5 ' + costPerKg.toFixed(2) + ' <span class="result-price-unit">CNY/kg</span></div>';
  html += '</div>';

  content.innerHTML = html;
}

function resetForm() {
  boxes = [];
  renderBoxList();
  clearBoxForm();
  clearHsSelection();
  document.getElementById('hs-code').value = '';
  document.getElementById('hs-results').classList.remove('show');
  document.getElementById('hs-results').innerHTML = '';
  document.getElementById('total-weight').value = '';
  document.getElementById('cargo-value').value = '';
  document.getElementById('custom-tariff-rate').value = '';
  document.getElementById('currency').value = 'JPY';
  document.getElementById('cost-mode-cb').checked = false;
  document.getElementById('result-card').classList.remove('show');
  selectMode(0);
}

// HS编码搜索自动触发（输入时自动查询，带500ms防抖）
var hsCodeTimer = null;
document.getElementById('hs-code').addEventListener('input', function() {
  clearTimeout(hsCodeTimer);
  hsCodeTimer = setTimeout(function() {
    searchHs();
  }, 500);
});
document.getElementById('hs-code').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); searchHs(); }
});
</script>
